<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Volley Live Widget</title>
    <style>
        /* Base Glassmorphism Theme for Widget */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; /* Da integrare in siti scuri preferibilmente */
            color: #fff;
            margin: 0;
            padding: 1rem;
        }
        .widget-container {
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        h2 {
            color: #00f3ff;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h3 {
            color: #ff6b00;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .match-card {
            background: rgba(31, 40, 51, 0.6);
            border-left: 4px solid #00f3ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .match-card.finished {
            border-left-color: #4CAF50;
            opacity: 0.8;
        }
        .match-card.live-match {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            transform: scale(1.02);
            margin: 15px 0;
            padding: 16px;
        }
        .blinking-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-weight: bold;
        }
        .score {
            color: #ff6b00;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .meta {
            font-size: 0.75rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Table Styles for Standings */
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .standings-table th {
            text-align: left;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            color: #00f3ff;
        }
        .standings-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .standings-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .pts { color: #00f3ff; font-weight: bold; }

        .loading {
            text-align: center;
            color: #00f3ff;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="widget-container" id="bv-widget">
        <div class="loading">Caricamento dati in tempo reale...</div>
    </div>

    <!-- Firebase SDK (Sola lettura / CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('apiKey');
        const projectId = urlParams.get('projectId');
        const tournamentId = urlParams.get('tournId');
        const appId = urlParams.get('appId');
        const customTitle = urlParams.get('title') || 'Torneo Live';

        // === CONFIGURAZIONE WEBMASTER ===
        // Sostituisci questo valore con la "API Serverless Key" generata dalla Dashboard Admin
        const API_KEY = tournamentId;

        // Configurazione Firebase base (Prendi questa dal file src/lib/firebase.ts o Firebase Console)
        // Solo i campi projectId e databaseURL sono strettamente necessari per le letture anonime
        const firebaseConfig = {
            apiKey: apiKey, // Inizia solitamente con AIzaSy...
            projectId: projectId,
            appId: appId // Modificato da 'app' a 'appId'
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const widgetDiv = document.getElementById('bv-widget');

        if (API_KEY === "INSERISCI_QUI_LA_TUA_API_KEY_DEL_TORNEO") {
            widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center; padding: 20px;">Errore: Devi inserire la API KEY nel file widget.html</div>';
            throw new Error("Missing API Key");
        }

        // Ascolto in tempo reale sul documento pubblico
        const docRef = doc(db, 'public_tournaments', API_KEY);

        onSnapshot(docRef, (docSnap) => {
            if (!docSnap.exists()) {
                widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center;">Torneo non trovato o API Key errata.</div>';
                return;
            }

            const data = docSnap.data();
            renderWidget(data);
        }, (error) => {
            console.error("Errore di connessione a Firebase:", error);
            widgetDiv.innerHTML = '<div style="color: red; text-align:center;">Errore di connessione ai dati live.</div>';
        });

        function renderWidget(data) {
            let html = `<h2>${data.name}</h2>`;
            const statusStr = data.status === 'archived' ? ' (Archiviato)' : (data.status === 'knockout_stage' ? ' - Fase Finale' : ' - Fase a Gironi');
            html = `<h2>${data.name}<span style="font-size: 0.6em; color: #aaa;">${statusStr}</span></h2>`;

            // 1. Partite Live
            const liveMatches = data.matches ? data.matches.filter(m => m.status === 'live') : [];
            if (liveMatches.length > 0) {
                html += `<h3 style="color: #ef4444;"><span class="blinking-dot"></span> LIVE ORA</h3>`;
                liveMatches.forEach(match => {
                    const t1Name = getTeamName(data.groups, match.team1Id);
                    const t2Name = getTeamName(data.groups, match.team2Id);
                    html += `
                    <div class="match-card live-match">
                        <div class="meta">
                            <span>${match.phaseType.replace('_', ' ')}</span>
                            <span style="color: #ef4444; font-weight: bold;">IN CORSO</span>
                        </div>
                        <div class="team-row">
                            <span>${t1Name}</span>
                            <span class="score">${match.team1Score.join(' - ')}</span>
                        </div>
                        <div class="team-row">
                            <span>${t2Name}</span>
                            <span class="score">${match.team2Score.join(' - ')}</span>
                        </div>
                    </div>`;
                });
            }

            // 1b. Partite Programmate (Upcoming) ordinate cronologicamente
            const scheduledMatches = data.matches ? data.matches
                .filter(m => m.status === 'scheduled' || (!m.isFinished && m.status !== 'live'))
                .sort((a, b) => {
                    const dateA = a.scheduledAt ? new Date(a.scheduledAt).getTime() : 0;
                    const dateB = b.scheduledAt ? new Date(b.scheduledAt).getTime() : 0;
                    return dateA - dateB;
                }) : [];

            if (scheduledMatches.length > 0) {
                html += `<h3>Prossime Partite</h3>`;
                scheduledMatches.forEach(match => {
                    const t1Name = getTeamName(data.groups, match.team1Id);
                    const t2Name = getTeamName(data.groups, match.team2Id);
                    const timeStr = match.scheduledAt ? new Date(match.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : match.scheduledTime;
                    html += `
                    <div class="match-card" style="padding: 8px; margin-bottom: 6px;">
                        <div class="meta" style="margin-bottom: 4px;">
                            <span>${match.phaseType.replace('_', ' ')}</span>
                            <span>${timeStr ? '⏰ ' + timeStr : 'Da definire'}</span>
                        </div>
                        <div class="team-row" style="font-size: 0.9em; margin: 2px 0;"><span>${t1Name}</span> <span>vs</span> <span>${t2Name}</span></div>
                    </div>`;
                });
            }

            // 2. Ultimi Risultati (Ultime 3 finite)
            const finishedMatches = data.matches ? data.matches.filter(m => m.isFinished || m.status === 'finished').slice(-3) : [];
            if (finishedMatches.length > 0) {
                 html += `<h3>Ultimi Risultati</h3>`;
                 finishedMatches.forEach(match => {
                    const t1Name = getTeamName(data.groups, match.team1Id);
                    const t2Name = getTeamName(data.groups, match.team2Id);
                    html += `
                    <div class="match-card finished">
                        <div class="meta"><span>${match.phaseType.replace('_', ' ')}</span> <span>${match.scheduledTime ? '⏰ ' + match.scheduledTime + ' - ' : ''}FINITA</span></div>
                        <div class="team-row"><span>${t1Name}</span> <span class="score">${match.team1Score.join(' - ')}</span></div>
                        <div class="team-row"><span>${t2Name}</span> <span class="score">${match.team2Score.join(' - ')}</span></div>
                    </div>`;
                 });
            }

            // 3. Renderizzazione Condizionale Tabellone Finale
            if (data.hasKnockoutStarted === true) {
                const bracketMatches = data.matches ? data.matches.filter(m => m.phaseType !== 'groups') : [];
                if (bracketMatches.length > 0) {
                    html += `<h3 style="color: #c5b4e3; border-bottom: 1px solid rgba(197,180,227,0.3); padding-bottom: 5px;">Tabellone Fasi Finali</h3>`;

                    const phases = ['round_16', 'quarter_finals', 'semi_finals', 'finals', 'third_place'];
                    phases.forEach(phase => {
                        const phaseMatches = bracketMatches.filter(m => m.phaseType === phase);
                        if (phaseMatches.length > 0) {
                            html += `<h4>${phase === 'third_place' ? 'Finale 3°/4° Posto' : phase.replace('_', ' ').toUpperCase()}</h4>`;
                            phaseMatches.forEach(match => {
                                // Skip return match visualization as a separate block to avoid duplicates in simple list
                                if (match.legIndex === 1) return;

                                const t1Name = getTeamName(data.groups, match.team1Id);
                                const t2Name = getTeamName(data.groups, match.team2Id);
                                const returnMatch = bracketMatches.find(m => m.nextMatchId === match.id && m.legIndex === 1);

                                const isMatchLive = match.status === 'live';
                                const timeStrMatch = match.scheduledAt ? new Date(match.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : match.scheduledTime;

                                html += `
                                <div class="match-card ${match.isFinished ? 'finished' : ''} ${isMatchLive ? 'live-match' : ''}" style="${!match.isFinished && !isMatchLive ? 'border-left-color: #c5b4e3;' : ''}">
                                    <div class="meta">
                                        <span>${timeStrMatch ? '⏰ ' + timeStrMatch : 'Da definire'}</span>
                                        ${match.isFinished ? '<span>FINITA</span>' : isMatchLive ? '<span style="color:#ef4444" class="blinking-dot"></span>' : ''}
                                    </div>
                                    ${returnMatch ? '<div style="font-size:0.7rem; color:#c5b4e3; margin-bottom:4px;">Andata</div>' : ''}
                                    <div class="team-row"><span>${t1Name}</span> <span class="score">${match.team1Score.join(' - ')}</span></div>
                                    <div class="team-row"><span>${t2Name}</span> <span class="score">${match.team2Score.join(' - ')}</span></div>
                                `;

                                if (returnMatch) {
                                    const isReturnLive = returnMatch.status === 'live';
                                    const timeStrReturn = returnMatch.scheduledAt ? new Date(returnMatch.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : returnMatch.scheduledTime;

                                    html += `
                                    <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 8px;" class="${isReturnLive ? 'live-match' : ''}">
                                        <div class="meta">
                                            <span>${timeStrReturn ? '⏰ ' + timeStrReturn : 'Da definire'}</span>
                                            ${returnMatch.isFinished ? '<span>FINITA</span>' : isReturnLive ? '<span style="color:#ef4444" class="blinking-dot"></span>' : ''}
                                        </div>
                                        <div style="font-size:0.7rem; color:#ff6b00; margin-bottom:4px;">Ritorno</div>
                                        <div class="team-row"><span>${getTeamName(data.groups, returnMatch.team1Id)}</span> <span class="score">${returnMatch.team1Score.join(' - ')}</span></div>
                                        <div class="team-row"><span>${getTeamName(data.groups, returnMatch.team2Id)}</span> <span class="score">${returnMatch.team2Score.join(' - ')}</span></div>
                                    </div>
                                    `;
                                }
                                html += `</div>`;
                            });
                        }
                    });
                }
            }

            // 4. Classifiche Gironi
            if (data.groups && data.groups.length > 0) {
                html += `<h3>Classifiche Gironi</h3>`;
                data.groups.forEach(group => {
                    html += `<h4>${group.name}</h4>`;
                    html += `
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>Squadra</th>
                                <th>Pt</th>
                                <th>Set</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;
                    group.teams.forEach(team => {
                        const diff = team.totalPointsScored - team.totalPointsConceded;
                        html += `
                        <tr>
                            <td>${team.name}</td>
                            <td class="pts">${team.points}</td>
                            <td>${team.setsWon}-${team.setsLost}</td>
                            <td>${diff > 0 ? '+'+diff : diff}</td>
                        </tr>`;
                    });
                    html += `</tbody></table>`;
                });
            }

            widgetDiv.innerHTML = html;
        }

        function getTeamName(groups, teamId) {
            if (!teamId) return 'TBD';
            if (groups) {
                for (const group of groups) {
                    const team = group.teams.find(t => t.id === teamId);
                    if (team) return team.name;
                }
            }
            return 'TBD';
        }
    </script>
</body>
</html>
