<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Volley Live Widget</title>
    <style>
        /* Base Glassmorphism Theme for Widget */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; 
            color: #fff;
            margin: 0;
            padding: 1rem;
        }
        .widget-container {
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box; /* Evita che il padding sbordi */
            margin: 0 auto;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* NUOVA GRIGLIA RESPONSIVE */
        .widget-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Due colonne uguali su PC */
            gap: 30px;
            align-items: start; /* Allinea in alto */
        }

        @media (max-width: 768px) {
            .widget-grid {
                grid-template-columns: 1fr; /* Una colonna singola impilata su Mobile */
            }
        }
        h2 {
            color: #00f3ff;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h3 {
            color: #ff6b00;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .match-card {
            background: rgba(31, 40, 51, 0.6);
            border-left: 4px solid #00f3ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .match-card.finished {
            border-left-color: #4CAF50;
            opacity: 0.8;
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-weight: bold;
        }
        .score {
            color: #ff6b00;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .meta {
            font-size: 0.75rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .standings-table th {
            text-align: left;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            color: #00f3ff;
        }
        .standings-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .standings-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .pts { color: #00f3ff; font-weight: bold; }
        .loading {
            text-align: center;
            color: #00f3ff;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="widget-container" id="bv-widget">
        <div class="loading">Caricamento dati in tempo reale...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // === CATTURA DINAMICA DELLE VARIABILI ===
        // Questa è la riga che mancava! Legge i segreti inviati da index.html
        const urlParams = new URLSearchParams(window.location.search);

        const TOURNAMENT_ID = urlParams.get('tournId');
        const customTitle = urlParams.get('title') || 'Torneo Live';
        
        const apiKey = urlParams.get('apiKey');
        const projectId = urlParams.get('projectId');
        const appId = urlParams.get('appId');

        // === CONFIGURAZIONE FIREBASE DINAMICA ===
        const firebaseConfig = {
            apiKey: apiKey, 
            projectId: projectId,
            appId: appId 
        };

        const widgetDiv = document.getElementById('bv-widget');

        if (!TOURNAMENT_ID || !apiKey || !projectId) {
            widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center; padding: 20px;">Errore: Chiavi di sicurezza o ID Torneo mancanti.</div>';
            throw new Error("Missing parameters");
        }

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ascolto in tempo reale sul documento
        const docRef = doc(db, 'public_tournaments', TOURNAMENT_ID);

        onSnapshot(docRef, (docSnap) => {
            if (!docSnap.exists()) {
                widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center;">Torneo non trovato. Verifica l\'ID inserito nel Pannello Admin.</div>';
                return;
            }

            const data = docSnap.data();
            renderWidget(data);
        }, (error) => {
            console.error("Errore di connessione a Firebase:", error);
            widgetDiv.innerHTML = '<div style="color: red; text-align:center;">Errore di connessione ai dati live. Verifica l\'API Key e i permessi.</div>';
        });

        function renderWidget(data) {
            // Usa il titolo personalizzato inserito dall'admin
            let html = `<h2>${customTitle}</h2>`;

            // 1. Partite Live
            const liveMatches = data.matches ? data.matches.filter(m => !m.isFinished) : [];
            if (liveMatches.length > 0) {
                html += `<h3>Partite Live / Prossime</h3>`;
                liveMatches.forEach(match => {
                    const t1Name = getTeamName(data.groups, match.team1Id);
                    const t2Name = getTeamName(data.groups, match.team2Id);

                    html += `
                    <div class="match-card">
                        <div class="meta">
                            <span>${match.phaseType ? match.phaseType.replace('_', ' ') : ''}</span>
                            <span>${match.scheduledTime ? '⏰ ' + match.scheduledTime : 'Live'}</span>
                        </div>
                        <div class="team-row">
                            <span>${t1Name}</span>
                            <span class="score">${match.team1Score ? match.team1Score.join(' - ') : '0'}</span>
                        </div>
                        <div class="team-row">
                            <span>${t2Name}</span>
                            <span class="score">${match.team2Score ? match.team2Score.join(' - ') : '0'}</span>
                        </div>
                    </div>`;
                });
            }

            // 2. Ultimi Risultati
            const finishedMatches = data.matches ? data.matches.filter(m => m.isFinished).slice(-3) : [];
            if (finishedMatches.length > 0) {
                 html += `<h3>Ultimi Risultati</h3>`;
                 finishedMatches.forEach(match => {
                    const t1Name = getTeamName(data.groups, match.team1Id);
                    const t2Name = getTeamName(data.groups, match.team2Id);
                    html += `
                    <div class="match-card finished">
                        <div class="meta"><span>${match.phaseType ? match.phaseType.replace('_', ' ') : ''}</span> <span>FINITA</span></div>
                        <div class="team-row"><span>${t1Name}</span> <span class="score">${match.team1Score.join(' - ')}</span></div>
                        <div class="team-row"><span>${t2Name}</span> <span class="score">${match.team2Score.join(' - ')}</span></div>
                    </div>`;
                 });
            }

            // 3. Classifiche Gironi
            if (data.groups && data.groups.length > 0) {
                html += `<h3>Classifiche Gironi</h3>`;
                data.groups.forEach(group => {
                    html += `<h4>${group.name}</h4>`;
                    html += `
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>Squadra</th>
                                <th>Pt</th>
                                <th>Set</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;
                    group.teams.forEach(team => {
                        const diff = team.totalPointsScored - team.totalPointsConceded;
                        html += `
                        <tr>
                            <td>${team.name}</td>
                            <td class="pts">${team.points}</td>
                            <td>${team.setsWon}-${team.setsLost}</td>
                            <td>${diff > 0 ? '+'+diff : diff}</td>
                        </tr>`;
                    });
                    html += `</tbody></table>`;
                });
            }

            widgetDiv.innerHTML = html;
        }

        function getTeamName(groups, teamId) {
            if (!teamId) return 'TBD';
            if (groups) {
                for (const group of groups) {
                    const team = group.teams.find(t => t.id === teamId);
                    if (team) return team.name;
                }
            }
            return 'TBD';
        }
    </script>
</body>
</html>
