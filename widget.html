<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Volley Live Widget</title>
    <style>
        /* Base Glassmorphism Theme for Widget */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; 
            color: #fff;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden; /* Previene lo slider orizzontale indesiderato */
        }
        .widget-container {
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* Struttura a Griglia per separare Partite e Classifiche */
        .widget-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .widget-grid {
                grid-template-columns: 1fr; /* Impila su mobile */
            }
        }

        h2 {
            color: #00f3ff;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h3 {
            color: #ff6b00;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .match-card {
            background: rgba(31, 40, 51, 0.6);
            border-left: 4px solid #00f3ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            word-wrap: break-word;
        }
        .match-card.finished {
            border-left-color: #4CAF50;
            opacity: 0.8;
        }
        .match-card.live-match {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            transform: scale(1.02);
            margin: 15px 0;
            padding: 16px;
        }
        .blinking-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Mantiene il punteggio centrato rispetto alle due righe di testo */
            margin: 8px 0;
            font-weight: bold;
            gap: 10px;
        }
        .score {
            color: #ff6b00;
            font-family: monospace;
            font-size: 1.3rem;
            white-space: nowrap;
        }
        .meta {
            font-size: 0.75rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Table Styles for Standings */
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
            table-layout: auto;
        }
        .standings-table th {
            text-align: left;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            color: #00f3ff;
            white-space: nowrap;
        }
        .standings-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }
        .standings-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .pts { color: #00f3ff; font-weight: bold; }

        .loading {
            text-align: center;
            color: #00f3ff;
            padding: 20px;
        }
        /* --- Custom Scrollbar Glassmorphism --- */
        /* Per Chrome, Edge, Safari */
        ::-webkit-scrollbar {
            width: 8px; /* Rende la barra molto più sottile */
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(11, 12, 16, 0.3); /* Sfondo traccia quasi invisibile */
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3); /* Azzurro neon semi-trasparente */
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.8); /* Si illumina quando ci passi sopra col mouse */
        }

        /* Per Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 243, 255, 0.4) transparent;
        }
    </style>
</head>
<body>

    <div class="widget-container" id="bv-widget">
        <div class="loading">Caricamento dati in tempo reale...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // === CATTURA DINAMICA DELLE VARIABILI (Mantenuta dal file originale) ===
        const urlParams = new URLSearchParams(window.location.search);

        const tournId = urlParams.get('tournId');
        const customTitle = urlParams.get('title') || 'Torneo Live';
        
        const apiKey = urlParams.get('apiKey');
        const projectId = urlParams.get('projectId');
        const appId = urlParams.get('appId');

        // === CONFIGURAZIONE FIREBASE DINAMICA ===
        const firebaseConfig = {
            apiKey: apiKey,
            projectId: projectId,
            appId: appId
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const widgetDiv = document.getElementById('bv-widget');

        if (!tournId || !apiKey || !projectId) {
            widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center; padding: 20px;">Errore: Chiavi di sicurezza o ID Torneo mancanti dall\'URL.</div>';
            throw new Error("Missing parameters");
        }

        // Ascolto in tempo reale sul documento pubblico usando il tournId (ID Torneo)
        const docRef = doc(db, 'public_tournaments', tournId);

        onSnapshot(docRef, (docSnap) => {
            if (!docSnap.exists()) {
                widgetDiv.innerHTML = '<div style="color: #ff6b00; text-align:center;">Torneo non trovato o API Key errata.</div>';
                return;
            }

            const data = docSnap.data();
            renderWidget(data);
        }, (error) => {
            console.error("Errore di connessione a Firebase:", error);
            widgetDiv.innerHTML = '<div style="color: red; text-align:center;">Errore di connessione ai dati live.</div>';
        });

        // ==========================================
        // FUNZIONI DI RENDER SQUADRA (NOME + GIOCATORI)
        // ==========================================
        function getTeamHtml(teamObj) {
            if (!teamObj) return 'TBD';
            const validPlayers = (teamObj.players || []).filter(p => p.trim() !== '');
            let html = `<div style="display: flex; flex-direction: column; line-height: 1.2;">`;
            html += `<span style="font-weight: bold; font-size: 14px;">${teamObj.name}</span>`;
            if (validPlayers.length > 0) {
                html += `<span style="font-size: 11px; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 2px;">${validPlayers.join(' & ')}</span>`;
            }
            html += `</div>`;
            return html;
        }

        function getTeamName(groups, teamId) {
            if (!teamId) return 'TBD';
            if (groups) {
                for (const group of groups) {
                    const team = group.teams.find(t => t.id === teamId);
                    if (team) return getTeamHtml(team);
                }
            }
            return 'TBD';
        }

        // ==========================================
        // FUNZIONE PRINCIPALE DI RENDER WIDGET
        // ==========================================
        function renderWidget(data) {
            const statusStr = data.status === 'archived' ? ' (Archiviato)' : (data.status === 'knockout_stage' ? ' - Fase Finale' : ' - Fase a Gironi');
            let headerHtml = `<h2>${customTitle}<span style="font-size: 0.6em; color: #aaa;">${statusStr}</span></h2>`;
            
            let leftColumn = "";
            let rightColumn = "";

            // 1. Partite Live
            const liveMatches = data.matches ? data.matches.filter(m => m.status === 'live' && !m.isFinished) : [];
            if (liveMatches.length > 0) {
                leftColumn += `<h3 style="color: #ef4444;"><span class="blinking-dot"></span> LIVE ORA</h3>`;
                liveMatches.forEach(match => {
                    const t1Html = getTeamName(data.groups, match.team1Id);
                    const t2Html = getTeamName(data.groups, match.team2Id);
                    leftColumn += `
                    <div class="match-card live-match">
                        <div class="meta">
                            <span>${match.phaseType.replace('_', ' ')}</span>
                            <span style="color: #ef4444; font-weight: bold;">IN CORSO</span>
                        </div>
                        <div class="team-row">
                            ${t1Html}
                            <span class="score">${match.team1Score.join(' - ')}</span>
                        </div>
                        <div class="team-row">
                            ${t2Html}
                            <span class="score">${match.team2Score.join(' - ')}</span>
                        </div>
                    </div>`;
                });
            }

            // 1b. Partite Programmate (Upcoming)
            const scheduledMatches = data.matches ? data.matches
                .filter(m => !m.isFinished && m.status !== 'live' && m.status !== 'finished')
                .sort((a, b) => {
                    const dateA = a.scheduledAt ? new Date(a.scheduledAt).getTime() : Infinity;
                    const dateB = b.scheduledAt ? new Date(b.scheduledAt).getTime() : Infinity;
                    return dateA - dateB;
                }) : [];

            if (scheduledMatches.length > 0) {
                leftColumn += `<h3>Prossime Partite</h3>`;
                scheduledMatches.forEach(match => {
                    const t1Html = getTeamName(data.groups, match.team1Id);
                    const t2Html = getTeamName(data.groups, match.team2Id);
                    const timeStr = match.scheduledAt ? new Date(match.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : (match.scheduledTime || 'DA DEFINIRE');
                    leftColumn += `
                    <div class="match-card" style="padding: 10px; margin-bottom: 8px;">
                        <div class="meta" style="margin-bottom: 6px;">
                            <span>${match.phaseType.replace('_', ' ')}</span>
                            <span>${timeStr !== 'DA DEFINIRE' ? '⏰ ' + timeStr : timeStr}</span>
                        </div>
                        <div class="team-row" style="margin: 4px 0;">
                            <div style="flex: 1;">${t1Html}</div> 
                            <span style="color:#666; padding: 0 10px;">vs</span> 
                            <div style="flex: 1; text-align: right;">${t2Html}</div>
                        </div>
                    </div>`;
                });
            }

            // 2. Ultimi Risultati (Ultime 3 finite)
            const finishedMatches = data.matches ? data.matches.filter(m => m.isFinished || m.status === 'finished').slice(-3) : [];
            if (finishedMatches.length > 0) {
                 leftColumn += `<h3>Ultimi Risultati</h3>`;
                 finishedMatches.forEach(match => {
                    const t1Html = getTeamName(data.groups, match.team1Id);
                    const t2Html = getTeamName(data.groups, match.team2Id);
                    leftColumn += `
                    <div class="match-card finished">
                        <div class="meta"><span>${match.phaseType.replace('_', ' ')}</span> <span>${match.scheduledTime ? '⏰ ' + match.scheduledTime + ' - ' : ''}FINITA</span></div>
                        <div class="team-row">${t1Html} <span class="score">${match.team1Score.join(' - ')}</span></div>
                        <div class="team-row">${t2Html} <span class="score">${match.team2Score.join(' - ')}</span></div>
                    </div>`;
                 });
            }
            
            if(leftColumn === "") leftColumn = `<p style="color:#aaa; text-align:center;">Nessuna partita da mostrare al momento.</p>`;

            // ==========================================
            // COLONNA DESTRA: CLASSIFICHE E TABELLONE FINALE
            // ==========================================

            // 3. Tabellone Finale
            if (data.hasKnockoutStarted === true) {
                const bracketMatches = data.matches ? data.matches.filter(m => m.phaseType !== 'groups') : [];
                if (bracketMatches.length > 0) {
                    rightColumn += `<h3 style="color: #c5b4e3; border-bottom: 1px solid rgba(197,180,227,0.3); padding-bottom: 5px;">Tabellone Fasi Finali</h3>`;

                    const phases = ['round_16', 'quarter_finals', 'semi_finals', 'finals', 'third_place'];
                    phases.forEach(phase => {
                        const phaseMatches = bracketMatches.filter(m => m.phaseType === phase);
                        if (phaseMatches.length > 0) {
                            rightColumn += `<h4>${phase === 'third_place' ? 'Finale 3°/4° Posto' : phase.replace('_', ' ').toUpperCase()}</h4>`;
                            phaseMatches.forEach(match => {
                                if (match.legIndex === 1) return; // Salta il ritorno, viene gestito dentro

                                const t1Html = getTeamName(data.groups, match.team1Id);
                                const t2Html = getTeamName(data.groups, match.team2Id);
                                const returnMatch = bracketMatches.find(m => m.nextMatchId === match.id && m.legIndex === 1);

                                const isMatchLive = match.status === 'live';
                                const timeStrMatch = match.scheduledAt ? new Date(match.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : (match.scheduledTime || 'DA DEFINIRE');

                                rightColumn += `
                                <div class="match-card ${match.isFinished ? 'finished' : ''} ${isMatchLive ? 'live-match' : ''}" style="${!match.isFinished && !isMatchLive ? 'border-left-color: #c5b4e3;' : ''}">
                                    <div class="meta">
                                        <span>${timeStrMatch !== 'DA DEFINIRE' ? '⏰ ' + timeStrMatch : timeStrMatch}</span>
                                        ${match.isFinished ? '<span>FINITA</span>' : isMatchLive ? '<span style="color:#ef4444" class="blinking-dot"></span>' : ''}
                                    </div>
                                    ${returnMatch ? '<div style="font-size:0.7rem; color:#c5b4e3; margin-bottom:4px;">Andata</div>' : ''}
                                    <div class="team-row">${t1Html} <span class="score">${match.team1Score ? match.team1Score.join(' - ') : '0'}</span></div>
                                    <div class="team-row">${t2Html} <span class="score">${match.team2Score ? match.team2Score.join(' - ') : '0'}</span></div>
                                `;

                                if (returnMatch) {
                                    const isReturnLive = returnMatch.status === 'live';
                                    const timeStrReturn = returnMatch.scheduledAt ? new Date(returnMatch.scheduledAt).toLocaleString('it-IT', {day: '2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : (returnMatch.scheduledTime || 'DA DEFINIRE');

                                    rightColumn += `
                                    <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 8px;" class="${isReturnLive ? 'live-match' : ''}">
                                        <div class="meta">
                                            <span>${timeStrReturn !== 'DA DEFINIRE' ? '⏰ ' + timeStrReturn : timeStrReturn}</span>
                                            ${returnMatch.isFinished ? '<span>FINITA</span>' : isReturnLive ? '<span style="color:#ef4444" class="blinking-dot"></span>' : ''}
                                        </div>
                                        <div style="font-size:0.7rem; color:#ff6b00; margin-bottom:4px;">Ritorno</div>
                                        <div class="team-row">${getTeamName(data.groups, returnMatch.team1Id)} <span class="score">${returnMatch.team1Score ? returnMatch.team1Score.join(' - ') : '0'}</span></div>
                                        <div class="team-row">${getTeamName(data.groups, returnMatch.team2Id)} <span class="score">${returnMatch.team2Score ? returnMatch.team2Score.join(' - ') : '0'}</span></div>
                                    </div>
                                    `;
                                }
                                rightColumn += `</div>`;
                            });
                        }
                    });
                }
            }

            // 4. Classifiche Gironi (Aggiornate con i nomi giocatori)
            if (data.groups && data.groups.length > 0) {
                rightColumn += `<h3>Classifiche Gironi</h3>`;
                data.groups.forEach(group => {
                    rightColumn += `<h4>${group.name}</h4>`;
                    rightColumn += `
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>Squadra</th>
                                <th>Pt</th>
                                <th>Set</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;
                    group.teams.forEach(team => {
                        const diff = team.totalPointsScored - team.totalPointsConceded;
                        const teamHtmlForTable = getTeamHtml(team); // Applica il sottotesto anche in classifica
                        rightColumn += `
                        <tr>
                            <td>${teamHtmlForTable}</td>
                            <td class="pts">${team.points}</td>
                            <td>${team.setsWon}-${team.setsLost}</td>
                            <td>${diff > 0 ? '+'+diff : diff}</td>
                        </tr>`;
                    });
                    rightColumn += `</tbody></table>`;
                });
            }
            
            if(rightColumn === "") rightColumn = `<p style="color:#aaa; text-align:center;">Classifiche e tabelloni in fase di definizione.</p>`;

            // Stampa tutto nella griglia a due colonne
            widgetDiv.innerHTML = headerHtml + `
                <div class="widget-grid">
                    <div class="col-left">${leftColumn}</div>
                    <div class="col-right">${rightColumn}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
